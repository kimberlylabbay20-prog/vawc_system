<!DOCTYPE html>
<html>
<head>
    <title>VAWC Reporting System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #e3f2fd, #ffffff);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #0d47a1;
        }

        h2 {
            text-align: center;
            color: #1565c0;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            color: #333;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
        }

        button:hover {
            background: #0d47a1;
        }

        .success {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }

        .note {
            font-size: 13px;
            color: gray;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

<h1>Barangay VAWC Reporting System</h1>
<h2>📋 Report an Incident (Mag-report ng Insidente)</h2>

<p class="note">Your report is safe and confidential (Ligtas at kumpidensyal ang iyong ulat)</p>

<form id="reportForm">

<label>Victim's Name (Pangalan ng Biktima)</label>
<input type="text" id="victim_name" required placeholder="Example: Maria Santos">

<label>Contact Number (Numero ng Telepono)</label>
<input type="text" id="contact_number" required placeholder="09XXXXXXXXX">

<label>Type of Incident (Uri ng Pangyayari)</label>
<select id="incident_type" required>
  <option value="">Select (Pumili)</option>
  <option>Physical Abuse (Pananakit)</option>
  <option>Emotional Abuse (Pananakit ng Damdamin)</option>
  <option>Threat (Pananakot)</option>
  <option>Other (Iba pa)</option>
</select>

<label>Description (Detalye ng Insidente)</label>
<textarea id="description" required placeholder="Describe what happened (Ikwento kung ano ang nangyari)"></textarea>

<label>Location (Lugar ng Pangyayari)</label>
<input type="text" id="location" required placeholder="Example: Barangay 5">

<button type="submit">📨 Submit Report (I-submit ang Report)</button>

<div class="success" id="successMsg"></div>

</form>

</div>

<script>
document.getElementById("reportForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const successMsg = document.getElementById("successMsg");
    successMsg.style.color = "black";
    successMsg.innerText = "Submitting... (Ipinapasa ang report...)";

    const data = {
        victim_name: document.getElementById("victim_name").value,
        contact_number: document.getElementById("contact_number").value,
        incident_type: document.getElementById("incident_type").value,
        description: document.getElementById("description").value,
        location: document.getElementById("location").value
    };

    try {
        const response = await fetch("/submit_report", {   // ✅ FIXED (no full URL)
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        if(response.ok){
            successMsg.style.color = "green";
            successMsg.innerText = "✅ Report submitted successfully (Matagumpay na naisumite ang report!)";
            document.getElementById("reportForm").reset();
        } else {
            successMsg.style.color = "red";
            successMsg.innerText = "❌ Error occurred (May error, pakisubukan ulit)";
        }

    } catch (error) {
        successMsg.style.color = "red";
        successMsg.innerText = "❌ Server not reachable (Hindi maabot ang server)";
    }
});
</script>

</body>
</html>
